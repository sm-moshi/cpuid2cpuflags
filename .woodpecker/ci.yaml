# cpuid2cpuflags — CI: format, lint, test (glibc + musl), docs, security
# Triggers on push to main and pull requests (GitHub forge).
when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: fmt
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo +nightly fmt --all --check
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: clippy
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
      RUSTFLAGS: -D warnings
    commands:
      - cargo clippy --all-targets --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: test-glibc
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo test --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: test-musl
    image: harbor.m0sh1.cc/apps/rust-ci:alpine-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
    backend_options:
      kubernetes:
        securityContext:
          runAsUser: 0
    commands:
      - cargo test --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: docs
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /home/ci/.rustup
      RUSTDOCFLAGS: -D warnings
    commands:
      - cargo doc --no-deps --document-private-items --all-features
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache

  - name: audit
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo audit

  - name: deny
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      RUSTUP_HOME: /home/ci/.rustup
    commands:
      - cargo deny check
