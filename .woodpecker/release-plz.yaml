# cpuid2cpuflags — release-plz: auto version bump + changelog + tag
# Runs on every push to main. Uses release-plz to:
#   1. Analyse conventional commits since the last version tag
#   2. Bump Cargo.toml version accordingly
#   3. Create a git tag (e.g. v0.1.0) — this triggers the release pipeline
when:
  - event: push
    branch: main

steps:
  - name: release-plz
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      RUSTUP_HOME: /woodpecker/cache/cpuid2cpuflags/rustup
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - curl -fsSL https://github.com/release-plz/release-plz/releases/latest/download/release-plz-x86_64-unknown-linux-musl.tar.gz -o /tmp/rp.tar.gz
      - mkdir -p ./bin
      - tar xzf /tmp/rp.tar.gz -C ./bin
      - chmod +x ./bin/release-plz
      - git config --global user.email "ci@m0sh1.cc"
      - git config --global user.name "Woodpecker CI"
      - git remote set-url origin "https://$GITHUB_TOKEN@github.com/sm-moshi/cpuid2cpuflags.git"
      - ./bin/release-plz release --git-token "$GITHUB_TOKEN"
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
