# cpuid2cpuflags — release-plz: auto version bump + changelog + tag
# Triggers on push to main only.
when:
  - event: push
    branch: main

steps:
  - name: release-plz
    image: harbor.m0sh1.cc/apps/rust-ci:debian-latest
    environment:
      CARGO_HOME: /woodpecker/cache/cpuid2cpuflags/cargo
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - RELEASE_PLZ_VERSION="0.3.131"
      - curl -sSfL "https://github.com/release-plz/release-plz/releases/download/release-plz-v$RELEASE_PLZ_VERSION/release-plz-aarch64-unknown-linux-gnu.tar.gz" | tar xz -C /usr/local/bin
      - git config user.email "woodpecker@ci.m0sh1.cc"
      - git config user.name "Woodpecker CI"
      - release-plz release
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
